<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reto | Escape Room Matemático</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="reto-body">

  <!-- Barra superior -->
  <header class="navbar">
    <div class="navbar-inner">
      <div class="clock" id="clock">45:00</div>

      <div class="progress-wrap">
        <div class="progress" aria-label="Progreso de retos">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-txt" id="progress-txt">0 / 6</div>
      </div>
    </div>
  </header>

  <main class="reto-shell">
    <!-- Encabezado narrativo del reto -->
    <section class="reto-header" aria-labelledby="reto-titulo">
      <div class="reto-eyebrow" id="reto-eyebrow">Nivel · Tipo de reto</div>
      <h1 id="reto-titulo">Título del reto</h1>
      <div class="reto-tags" id="reto-tags"></div>
    </section>

    <section class="reto-content">
      <!-- Contexto / narrativa -->
      <article class="reto-card">
        <h2>Contexto de la misión</h2>
        <p id="reto-narrativa">
          Aquí aparecerá la narrativa del reto.
        </p>
      </article>

      <!-- Pregunta -->
      <article class="reto-card">
        <form id="form-reto" novalidate>
          <fieldset class="reto-fieldset">
            <legend id="reto-enunciado">
              Aquí aparecerá el enunciado del reto.
            </legend>

            <div
              id="reto-opciones"
              class="opciones"
              aria-describedby="instruccion-opciones feedback"
            >
              <!-- Las opciones se insertan dinámicamente desde gameEngine.js -->
            </div>

            <p id="instruccion-opciones" class="text-help">
              Selecciona una opción y luego presiona “Validar respuesta”.
            </p>
          </fieldset>

          <div class="reto-actions">
            <button type="button" class="btn btn-primary btn-validate" id="btn-validar" disabled>
              Validar respuesta
            </button>

            <button type="button" class="btn btn-secondary" id="btn-siguiente">
              Siguiente misión →
            </button>
          </div>
        </form>

        <!-- Feedback -->
        <section
          id="feedback"
          class="feedback-card"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="feedback-top">
            <span id="fb-icon" aria-hidden="true">ℹ️</span>
            <h3 id="fb-title">Retroalimentación</h3>
          </div>
          <div id="fb-text">
            Aquí aparecerán las pistas, correcciones o explicaciones.
          </div>
        </section>
      </article>
    </section>
  </main>

  <script src="gameEngine.js"></script>
</body>
</html>
